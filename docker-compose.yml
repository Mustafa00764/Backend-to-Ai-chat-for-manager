services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: manager_ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: manager_ai
      POSTGRES_USER: manager_ai
      POSTGRES_PASSWORD: manager_ai_password
    ports:
      - "5433:5432"
    volumes:
      - manager_ai_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: manager_ai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - manager_ai_redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: manager_ai_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: manager_ai_minio
      MINIO_ROOT_PASSWORD: manager_ai_minio_password
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - manager_ai_minio_data:/data

volumes:
  manager_ai_postgres_data:
  manager_ai_redis_data:
  manager_ai_minio_data: